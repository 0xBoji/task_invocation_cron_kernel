<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#131A33"/>
      <stop offset="1" stop-color="#1A2242"/>
    </linearGradient>
    <linearGradient id="accent" x1="136" y1="124" x2="1144" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow" x="146" y="259" width="986" height="188" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <rect x="64" y="64" width="1152" height="512" rx="24" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <text x="136" y="150" fill="#B8C1EC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26">RAI • TASK INVOCATION CRON KERNEL</text>
  <text x="136" y="250" fill="url(#accent)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="96" font-weight="800">TICK</text>
  <text x="136" y="314" fill="#E6EAFD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="30" font-weight="600">Mesh-aware distributed cron scheduling</text>
  <text x="136" y="358" fill="#9CA9D1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28">Role-aware routing • WASP-backed local execution • VIEW-friendly JSON events</text>

  <g filter="url(#glow)">
    <text x="168" y="392" fill="#6EE7FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="30">$ tick daemon</text>
    <text x="168" y="432" fill="#D7E3FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">{&quot;rai_component&quot;:&quot;tick&quot;,&quot;event&quot;:&quot;job_triggered&quot;,&quot;rai_level&quot;:&quot;info&quot;}</text>
  </g>

  <rect x="136" y="472" width="236" height="52" rx="14" fill="#0F172A" stroke="#1E2A52"/>
  <text x="163" y="505" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">curl -fsSL ... | bash</text>

  <rect x="896" y="112" width="224" height="56" rx="16" fill="#0B1224" stroke="#22305A"/>
  <text x="927" y="146" fill="#6EE7FF" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">local-only</text>
  <rect x="896" y="186" width="224" height="56" rx="16" fill="#0B1224" stroke="#22305A"/>
  <text x="944" y="220" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">mesh-any</text>
  <rect x="896" y="260" width="224" height="56" rx="16" fill="#0B1224" stroke="#22305A"/>
  <text x="925" y="294" fill="#F9A8D4" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">remote-only</text>
</svg>
