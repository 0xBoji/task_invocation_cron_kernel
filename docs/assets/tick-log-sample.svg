<svg width="1180" height="760" viewBox="0 0 1180 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1180" height="760" rx="28" fill="#0B1020"/>
  <rect x="32" y="32" width="1116" height="696" rx="20" fill="#0E152B" stroke="#22305A" stroke-width="2"/>
  <circle cx="78" cy="78" r="10" fill="#FB7185"/>
  <circle cx="110" cy="78" r="10" fill="#FBBF24"/>
  <circle cx="142" cy="78" r="10" fill="#34D399"/>
  <text x="180" y="86" fill="#BAC8F6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24">tick daemon — sample event stream</text>

  <text x="64" y="154" fill="#7DD3FC" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">$ tick daemon</text>
  <text x="64" y="214" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">{&quot;rai_component&quot;:&quot;tick&quot;,&quot;rai_level&quot;:&quot;info&quot;,&quot;event&quot;:&quot;daemon_started&quot;,&quot;message&quot;:&quot;tick daemon started and watching persisted jobs&quot;}</text>
  <text x="64" y="266" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">{&quot;rai_component&quot;:&quot;tick&quot;,&quot;rai_level&quot;:&quot;info&quot;,&quot;event&quot;:&quot;job_triggered&quot;,&quot;execution_policy&quot;:&quot;mesh_any&quot;,&quot;job_mode&quot;:&quot;wasm&quot;}</text>
  <text x="64" y="318" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">{&quot;rai_component&quot;:&quot;tick&quot;,&quot;rai_level&quot;:&quot;info&quot;,&quot;event&quot;:&quot;job_dispatched&quot;,&quot;selected_agent_id&quot;:&quot;agent-a&quot;,&quot;selected_agent_local&quot;:true}</text>
  <text x="64" y="370" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">{&quot;rai_component&quot;:&quot;tick&quot;,&quot;rai_level&quot;:&quot;warn&quot;,&quot;event&quot;:&quot;job_skipped&quot;,&quot;message&quot;:&quot;no idle agent matched role and policy&quot;}</text>
  <text x="64" y="422" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">{&quot;rai_component&quot;:&quot;tick&quot;,&quot;rai_level&quot;:&quot;info&quot;,&quot;event&quot;:&quot;remote_dispatch_simulated&quot;,&quot;selected_agent_id&quot;:&quot;agent-remote-01&quot;}</text>
  <text x="64" y="474" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">{&quot;rai_component&quot;:&quot;tick&quot;,&quot;rai_level&quot;:&quot;error&quot;,&quot;event&quot;:&quot;job_failed&quot;,&quot;message&quot;:&quot;failed to query CAMP mesh&quot;}</text>

  <rect x="64" y="544" width="490" height="132" rx="16" fill="#0B1224" stroke="#203056"/>
  <text x="92" y="584" fill="#93C5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="700">What VIEW can read from this</text>
  <text x="92" y="618" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="20">• component identity</text>
  <text x="92" y="648" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="20">• severity level</text>
  <text x="352" y="618" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="20">• event type</text>
  <text x="352" y="648" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="20">• selected agent</text>

  <rect x="636" y="544" width="480" height="132" rx="16" fill="#0B1224" stroke="#203056"/>
  <text x="664" y="584" fill="#C4B5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="700">Why no history in TICK?</text>
  <text x="664" y="618" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="20">• daemon stays lightweight</text>
  <text x="664" y="648" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="20">• VIEW owns retention and visualization</text>
</svg>
